name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: CI=true npm test -- --runInBand src/__tests__/exportBuild.spec.js src/__tests__/locationsSource.spec.js src/__tests__/materialDisplay.spec.js src/__tests__/requestContract.spec.js

      - name: Build
        run: npm run build
